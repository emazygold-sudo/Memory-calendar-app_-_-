
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Calendar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #FDF8F3; color: #2D1810; padding: 20px; }
        .calendar { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; position: relative; }
        .header { background: #D4A574; color: white; padding: 20px; text-align: center; }
        .month-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .month-nav button { background: rgba(255,255,255,0.2); border: none; color: white; font-size: 20px; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: #F3EDE7; padding: 12px; text-align: center; font-weight: bold; }
        .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 12px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; background: white; transition: all 0.2s; position: relative; }
        .day:hover { background: #F3EDE7; }
        .day.selected { background: #D4A574; color: white; }
        .day.other-month { color: #ccc; }
        .has-event { position: relative; }
        .has-event::after { content: ''; position: absolute; bottom: 4px; width: 6px; height: 6px; background: #D4A574; border-radius: 50%; }
        .events-panel { padding: 20px; border-top: 1px solid #E8DDD4; max-height: 400px; overflow-y: auto; }
        .add-event { background: #D4A574; color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; margin-bottom: 16px; width: 100%; font-size: 16px; }
        .event { background: #FDF8F3; padding: 12px; margin-bottom: 12px; border-radius: 12px; border-left: 3px solid #D4A574; }
        .event-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .event-desc { font-size: 14px; color: #666; margin-bottom: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 16px; padding: 20px; max-width: 90%; width: 450px; max-height: 80%; overflow-y: auto; }
        .modal input, .modal textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #E8DDD4; border-radius: 8px; font-family: inherit; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 16px; }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #D4A574; color: white; }
        .btn-secondary { background: #E8DDD4; color: #2D1810; }
        .btn-danger { background: #EF4444; color: white; }
        .vault-btn { background: transparent; border: 2px dashed #D4A574; color: #D4A574; padding: 12px; border-radius: 12px; cursor: pointer; margin-top: 16px; width: 100%; font-size: 14px; }
        .vault-section { display: none; margin-top: 20px; padding: 16px; background: #F3EDE7; border-radius: 12px; }
        .vault-section.active { display: block; }
        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-top: 12px; }
        .media-item { position: relative; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .media-item img, .media-item video { width: 100%; height: 100px; object-fit: cover; }
        .media-item button { position: absolute; top: 4px; right: 4px; background: #EF4444; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 12px; }
        .add-media-btn { background: #B8956A; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 12px; }
        .lock-status { text-align: center; padding: 8px; color: #999; font-size: 12px; font-style: italic; }
        .double-tap-hint { text-align: center; padding: 4px; color: #ccc; font-size: 10px; }
    </style>
</head>
<body>
    <div class="calendar" id="calendarContainer">
        <div class="header">
            <h1>📅 Memory Calendar</h1>
            <div class="month-nav">
                <button onclick="prevMonth()">←</button>
                <h2 id="monthYear"></h2>
                <button onclick="nextMonth()">→</button>
            </div>
        </div>
        <div class="weekdays">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div class="days" id="days"></div>
        <div class="events-panel">
            <button class="add-event" onclick="openEventModal()">+ Add Memory</button>
            <div id="eventsList"></div>
            
            <div class="lock-status" id="lockStatus">🔒 Vault locked</div>
            <div class="double-tap-hint">(double-tap anywhere to unlock vault)</div>
            
            <div id="vaultSection" class="vault-section">
                <h3>🔓 Secret Vault</h3>
                <p style="font-size: 12px; color: #666;">Your private photos & videos</p>
                <div id="mediaGrid" class="media-grid"></div>
                <button class="add-media-btn" onclick="addMedia()">+ Add Photo or Video</button>
            </div>
        </div>
    </div>

    <!-- Event Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <h3>Add Memory</h3>
            <input type="text" id="eventTitle" placeholder="Event title" required>
            <textarea id="eventDesc" placeholder="Description" rows="3"></textarea>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeEventModal()">Cancel</button>
                <button class="btn-primary" onclick="saveEvent()">Save</button>
            </div>
        </div>
    </div>

    <script>
        // Calendar data
        let currentDate = new Date();
        let selectedDate = new Date().toISOString().split('T')[0];
        let events = JSON.parse(localStorage.getItem('events') || '{}');
        let vault = JSON.parse(localStorage.getItem('vault') || '{"media":[]}');
        
        // Vault lock state
        let vaultUnlocked = false;
        let doubleTapTimer = null;
        
        // Setup double-tap detection
        const calendarContainer = document.getElementById('calendarContainer');
        calendarContainer.addEventListener('dblclick', function(e) {
            e.stopPropagation();
            toggleVault();
        });
        
        function toggleVault() {
            vaultUnlocked = !vaultUnlocked;
            const vaultSection = document.getElementById('vaultSection');
            const lockStatus = document.getElementById('lockStatus');
            
            if (vaultUnlocked) {
                vaultSection.classList.add('active');
                lockStatus.innerHTML = '🔓 Vault unlocked (double-tap to lock)';
                renderVault();
            } else {
                vaultSection.classList.remove('active');
                lockStatus.innerHTML = '🔒 Vault locked (double-tap to unlock)';
            }
        }
        
        function renderVault() {
            const mediaGrid = document.getElementById('mediaGrid');
            if (!vaultUnlocked) return;
            
            if (!vault.media || vault.media.length === 0) {
                mediaGrid.innerHTML = '<p style="color: #999; text-align: center; grid-column: 1/-1;">No private media yet. Tap + to add.</p>';
                return;
            }
            
            mediaGrid.innerHTML = vault.media.map((item, idx) => `
                <div class="media-item">
                    ${item.type === 'video' ? 
                        `<video src="${item.url}" controls></video>` : 
                        `<img src="${item.url}" onclick="viewFullscreen('${item.url}')">`
                    }
                    <button onclick="deleteMedia(${idx})">×</button>
                </div>
            `).join('');
        }
        
        function addMedia() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,video/*';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const mediaType = file.type.startsWith('video') ? 'video' : 'image';
                        vault.media.push({
                            url: event.target.result,
                            type: mediaType,
                            date: new Date().toISOString()
                        });
                        localStorage.setItem('vault', JSON.stringify(vault));
                        renderVault();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }
        
        function deleteMedia(index) {
            if (confirm('Delete this private media?')) {
                vault.media.splice(index, 1);
                localStorage.setItem('vault', JSON.stringify(vault));
                renderVault();
            }
        }
        
        function viewFullscreen(url) {
            const win = window.open();
            win.document.write(`
                <html><body style="margin:0; background:black; display:flex; justify-content:center; align-items:center; height:100vh;">
                <img src="${url}" style="max-width:100%; max-height:100%;" onclick="window.close()">
                </body></html>
            `);
        }
        
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - firstDay.getDay());

            document.getElementById('monthYear').innerText = 
                currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });

            const daysGrid = document.getElementById('days');
            daysGrid.innerHTML = '';

            for (let i = 0; i < 42; i++) {
                const date = new Date(startDate);
                date.setDate(startDate.getDate() + i);
                const dateStr = date.toISOString().split('T')[0];
                const dayNum = date.getDate();
                const isCurrentMonth = date.getMonth() === month;
                const isSelected = dateStr === selectedDate;
                const hasEvent = events[dateStr] && events[dateStr].length > 0;

                const dayDiv = document.createElement('div');
                dayDiv.className = `day ${!isCurrentMonth ? 'other-month' : ''} ${isSelected ? 'selected' : ''} ${hasEvent ? 'has-event' : ''}`;
                dayDiv.innerText = dayNum;
                dayDiv.onclick = () => selectDate(dateStr);
                daysGrid.appendChild(dayDiv);
            }

            renderEvents();
        }

        function selectDate(dateStr) {
            selectedDate = dateStr;
            renderCalendar();
        }

        function renderEvents() {
            const eventsList = document.getElementById('eventsList');
            const dayEvents = events[selectedDate] || [];
            
            if (dayEvents.length === 0) {
                eventsList.innerHTML = '<p style="color: #999; text-align: center;">No memories for this day. Tap + to add one!</p>';
                return;
            }

            eventsList.innerHTML = dayEvents.map((event, idx) => `
                <div class="event">
                    <div class="event-title">📌 ${escapeHtml(event.title)}</div>
                    ${event.description ? `<div class="event-desc">${escapeHtml(event.description)}</div>` : ''}
                    <button class="btn-danger" style="margin-top: 8px; padding: 4px 8px; font-size: 12px;" onclick="deleteEvent('${selectedDate}', ${idx})">Delete</button>
                </div>
            `).join('');
        }

        function openEventModal() {
            document.getElementById('eventModal').style.display = 'flex';
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDesc').value = '';
        }

        function closeEventModal() {
            document.getElementById('eventModal').style.display = 'none';
        }

        function saveEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            if (!title) {
                alert('Please enter an event title');
                return;
            }

            const desc = document.getElementById('eventDesc').value;

            if (!events[selectedDate]) events[selectedDate] = [];
            events[selectedDate].push({
                title: title,
                description: desc,
                date: new Date().toISOString()
            });
            
            localStorage.setItem('events', JSON.stringify(events));
            closeEventModal();
            renderCalendar();
        }

        function deleteEvent(date, index) {
            if (confirm('Delete this memory?')) {
                events[date].splice(index, 1);
                if (events[date].length === 0) delete events[date];
                localStorage.setItem('events', JSON.stringify(events));
                renderCalendar();
            }
        }

        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        renderCalendar();
    </script>
</body>
</html>
